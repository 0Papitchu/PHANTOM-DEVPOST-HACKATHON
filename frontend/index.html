<!-- PHANTOM UI Navigator — Interface principale -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM — UI Navigator</title>
    <meta name="description" content="AI agent that navigates any UI by vision and voice — zero DOM access">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Reset & Variables ─────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #fbfbfe;
            --bg-secondary: #f2f2f7;
            --bg-card: #ffffff;
            --bg-card-hover: #f9f9fb;
            --text-primary: #030303;
            --text-secondary: #4a4a4a;
            --text-muted: #8e8e93;
            --accent-cyan: #61dcef;
            --accent-purple: #0089fa;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --accent-orange: #6bc6ff;
            --accent-glow: rgba(97, 220, 239, 0.15);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-accent: rgba(97, 220, 239, 0.4);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated Background ──────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout ───────────────────────────────────── */
        .app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
        }

        /* ── Header ───────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(20px);
            background: rgba(251, 251, 254, 0.8);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
            }
        }

        .logo h1 {
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo .tagline {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* ── Toggle Switch ────────────────────────────── */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 8px;
        }

        .toggle-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-card);
            transition: .3s;
            border: 1px solid var(--border-subtle);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-muted);
            transition: .3s;
        }

        input:checked+.slider {
            background-color: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
            background-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .slider.round {
            border-radius: 24px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font-mono);
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.online .status-dot {
            animation: dot-pulse 2s ease-in-out infinite;
        }

        @keyframes dot-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Main Content ─────────────────────────────── */
        .main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 0;
            height: calc(100vh - 69px);
        }

        /* ── Screen View (Left Panel) ─────────────────── */
        .screen-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
        }

        .screen-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
        }

        .url-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            transition: border-color 0.2s;
        }

        .url-bar:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .url-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
        }

        .url-bar input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(168, 85, 247, 0.15));
            border-color: var(--border-accent);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.25), rgba(168, 85, 247, 0.25));
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-danger {
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ── Screen Viewport ──────────────────────────── */
        .screen-viewport {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow: hidden;
        }

        .screen-viewport img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            border-radius: 4px;
        }

        .screen-placeholder {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
        }

        .screen-placeholder .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .screen-placeholder p {
            font-size: 14px;
            max-width: 300px;
            line-height: 1.6;
        }

        /* ── Loading State ────────────────────────────── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(251, 251, 254, 0.95);
            z-index: 10;
            gap: 24px;
        }

        .loading-orb {
            position: relative;
            width: 120px;
            height: 120px;
        }

        /* Pulsing phantom icon in the center */
        .loading-orb-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            animation: orb-pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(97, 220, 239, 0.5));
            z-index: 2;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
        }

        /* Orbital ring 1 */
        .loading-ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: orbit 1.5s linear infinite;
        }

        /* Orbital ring 2 (reversed, offset) */
        .loading-ring-2 {
            position: absolute;
            inset: 10px;
            border: 2px solid transparent;
            border-right-color: var(--accent-purple);
            border-bottom-color: var(--accent-purple);
            border-radius: 50%;
            animation: orbit 2s linear infinite reverse;
        }

        /* Orbital ring 3 (small, fast) */
        .loading-ring-3 {
            position: absolute;
            inset: 22px;
            border: 1px solid transparent;
            border-left-color: var(--accent-green);
            border-radius: 50%;
            animation: orbit 1s linear infinite;
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Progress bar */
        .loading-progress {
            width: 200px;
            height: 3px;
            background: var(--border-subtle);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 2px;
            animation: progress-sweep 12s ease-in-out forwards;
        }

        @keyframes progress-sweep {
            0% { width: 0%; }
            15% { width: 20%; }
            40% { width: 45%; }
            60% { width: 60%; }
            80% { width: 80%; }
            95% { width: 90%; }
            100% { width: 95%; }
        }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--accent-cyan);
            animation: text-blink 1.5s ease-in-out infinite;
        }

        .loading-substatus {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            margin-top: -16px;
        }

        @keyframes text-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Scan Line Effect ─────────────────────────── */
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            opacity: 0.6;
            z-index: 5;
            animation: scan 3s ease-in-out infinite;
            pointer-events: none;
            display: none;
        }

        .scan-line.active {
            display: block;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        /* ── Bounding Box Overlay ─────────────────────── */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ui-element-box {
            position: absolute;
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
            background: rgba(0, 240, 255, 0.05);
            transition: all 0.3s ease;
            /* Sequential staggered fade-in — delay set via JS */
            opacity: 0;
            transform: scale(0.9);
            animation: box-appear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .ui-element-box.button {
            border-color: var(--accent-purple);
            background: rgba(168, 85, 247, 0.05);
        }

        .ui-element-box.input {
            border-color: var(--accent-green);
            background: rgba(34, 197, 94, 0.05);
        }

        .ui-element-box.link {
            border-color: var(--accent-orange);
            background: rgba(249, 115, 22, 0.05);
        }

        .ui-element-label {
            position: absolute;
            top: -20px;
            left: 0;
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 2px 6px;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-radius: 3px;
            white-space: nowrap;
            font-weight: 600;
        }

        @keyframes box-appear {
            0% {
                opacity: 0;
                transform: scale(0.9);
                box-shadow: 0 0 0 0 transparent;
            }

            60% {
                opacity: 1;
                transform: scale(1.02);
                box-shadow: 0 0 12px currentColor;
            }

            100% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 4px currentColor;
            }
        }

        /* ── Click Ripple Effect ──────────────────────────── */
        .click-ripple {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple-expand 0.8s ease-out forwards;
        }

        .click-ripple::before,
        .click-ripple::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            animation: ripple-ring 0.8s ease-out forwards;
        }

        .click-ripple::after {
            animation-delay: 0.15s;
            border-color: var(--accent-purple);
        }

        .click-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--accent-cyan);
            animation: dot-fade 0.6s ease-out forwards;
        }

        @keyframes ripple-ring {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        @keyframes ripple-expand {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes dot-fade {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
        }

        /* ── Right Panel ──────────────────────────────── */
        .side-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            height: 100%;
            overflow: hidden;
            min-height: 0;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
        }

        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .panel-tab.active {
            color: var(--accent-cyan);
            border-bottom-color: var(--accent-cyan);
        }

        .panel-tab:hover {
            color: var(--text-primary);
        }

        /* ── Activity Log ─────────────────────────────── */
        .activity-log {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-entry {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            animation: log-slide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes log-slide {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-entry .log-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .log-entry.narration .log-icon {
            background: rgba(0, 240, 255, 0.1);
        }

        .log-entry.action .log-icon {
            background: rgba(168, 85, 247, 0.1);
        }

        .log-entry.error .log-icon {
            background: rgba(239, 68, 68, 0.1);
        }

        .log-entry.success .log-icon {
            background: rgba(34, 197, 94, 0.1);
        }

        .log-entry.result {
            background: linear-gradient(135deg, rgba(97, 220, 239, 0.08), rgba(0, 137, 250, 0.08));
            border: 1px solid rgba(97, 220, 239, 0.2);
            border-radius: 12px;
        }

        .log-entry.result .log-text {
            font-size: 14px;
            line-height: 1.6;
        }

        .log-entry.result .log-icon {
            background: rgba(97, 220, 239, 0.15);
        }

        .log-entry .log-content {
            flex: 1;
            min-width: 0;
        }

        .log-entry .log-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .log-entry .log-time {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Elements Panel ───────────────────────────── */
        .elements-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: none;
        }

        .elements-list.active {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .element-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            transition: all 0.15s;
            cursor: default;
            /* Staggered slide-in — delay set via JS */
            opacity: 0;
            transform: translateX(-12px);
            animation: element-slide-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes element-slide-in {
            0% {
                opacity: 0;
                transform: translateX(-12px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .element-item:hover {
            border-color: var(--border-accent);
            background: var(--bg-card-hover);
        }

        .element-type-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .element-type-badge.button {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .element-type-badge.input {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }

        .element-type-badge.link {
            background: rgba(249, 115, 22, 0.15);
            color: var(--accent-orange);
        }

        .element-type-badge.search_bar {
            background: rgba(0, 240, 255, 0.15);
            color: var(--accent-cyan);
        }

        .element-type-badge.dropdown {
            background: rgba(249, 115, 22, 0.15);
            color: var(--accent-orange);
        }

        .element-type-badge.icon {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .element-type-badge.other {
            background: rgba(0, 240, 255, 0.15);
            color: var(--accent-cyan);
        }

        .element-label {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .element-confidence {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* ── Element Count Badge ──────────────────────── */
        .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            background: rgba(0, 240, 255, 0.15);
            color: var(--accent-cyan);
            margin-left: 4px;
        }

        /* ── Command Input ────────────────────────────── */
        .command-area {
            padding: 16px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-primary);
        }

        .command-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 4px;
            transition: all 0.2s;
        }

        .command-input-wrapper:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .command-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
        }

        .command-input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .mic-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: var(--bg-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .mic-btn.recording {
            animation: mic-pulse 1s ease-in-out infinite;
            background: var(--accent-red);
        }

        @keyframes mic-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            border-color: var(--accent-cyan);
            background: var(--bg-card-hover);
        }

        /* ── Scrollbar ────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }

            .screen-panel {
                border-right: none;
                border-bottom: 1px solid var(--border-subtle);
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- ── Header ──────────────────────────────── -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">👁️</div>
                <div>
                    <h1>PHANTOM</h1>
                    <div class="tagline">Navigator for All • Zero DOM • Pure Vision</div>
                </div>
            </div>
            <div class="header-status">
                <div class="toggle-container">
                    <label class="switch" title="Activer le mode Accessibilité (Voix descriptive + TTS)">
                        <input type="checkbox" id="accessibilityToggle" onchange="toggleAccessibility(this.checked)">
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label" style="display: flex; align-items: center; gap: 4px;">♿
                        Accessibility</span>
                </div>
                <div class="status-badge offline" id="statusBadge">
                    <span class="status-dot"></span>
                    <span id="statusText">OFFLINE</span>
                </div>
            </div>
        </header>

        <!-- ── Main Content ────────────────────────── -->
        <div class="main">
            <!-- Left Panel — Screen View -->
            <div class="screen-panel">
                <div class="screen-toolbar">
                    <div class="url-bar">
                        <span>🌐</span>
                        <input type="text" id="urlInput" placeholder="Enter URL to navigate...">
                    </div>
                    <button class="btn btn-primary" id="startBtn" onclick="startSession()">▶ START</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopSession()" style="display:none">⏹
                        STOP</button>
                </div>

                <div class="screen-viewport" id="screenViewport">
                    <div class="screen-placeholder" id="placeholder">
                        <div class="icon">👁️</div>
                        <p>Enter a URL and press START to launch Phantom's vision pipeline</p>
                    </div>
                    <div class="loading-overlay" id="loadingOverlay" style="display:none">
                        <div class="loading-orb">
                            <div class="loading-orb-center">👁️</div>
                            <div class="loading-ring"></div>
                            <div class="loading-ring-2"></div>
                            <div class="loading-ring-3"></div>
                        </div>
                        <div class="loading-text" id="loadingText">Launching browser...</div>
                        <div class="loading-substatus" id="loadingSubstatus">Initializing headless Chromium</div>
                        <div class="loading-progress"><div class="loading-progress-bar" id="loadingProgressBar"></div></div>
                    </div>
                    <div class="scan-line" id="scanLine"></div>
                    <img id="screenshotImg" style="display:none" alt="Browser screenshot">
                    <div class="overlay-container" id="overlayContainer"></div>
                </div>
            </div>

            <!-- Right Panel — Controls & Activity -->
            <div class="side-panel">
                <div class="panel-tabs">
                    <div class="panel-tab active" data-tab="activity" onclick="switchTab('activity')">📋 Activity</div>
                    <div class="panel-tab" data-tab="elements" onclick="switchTab('elements')">🎯 Elements <span
                            class="tab-badge" id="elementCount" style="display:none">0</span></div>
                </div>

                <div class="activity-log active" id="activityLog">
                    <div class="log-entry narration">
                        <div class="log-icon">🛸</div>
                        <div class="log-content">
                            <div class="log-text">Phantom is ready. Enter a URL and start a session.</div>
                            <div class="log-time">system</div>
                        </div>
                    </div>
                </div>

                <div class="elements-list" id="elementsList"></div>

                <div class="command-area">
                    <div class="command-input-wrapper">
                        <input type="text" id="commandInput" placeholder="Tell Phantom what to do..."
                            onkeydown="if(event.key==='Enter') sendCommand()">
                        <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
                        <button class="send-btn" onclick="sendCommand()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
